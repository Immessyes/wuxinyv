name: 课堂作业-CI/CD测试流水线

# 触发条件：代码推送到main分支时自动运行
on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置Python环境
      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. 运行测试（根据你的实际测试命令调整）
      - name: 执行单元测试
        run: |
          # 如果你的测试命令是 python -m unittest tests/test_calculator.py 就写这句
          python -m unittest tests/test_calculator.py -v