# 流水线名称
name: Gitee CI/CD 自动化流水线

# 触发条件：推送到main分支、提交PR到main分支时自动运行
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 任务定义
jobs:
  build-and-test:
    # 运行环境：Gitee提供的Ubuntu环境
    runs-on: ubuntu-latest

    steps:
      # 步骤1：拉取最新代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 步骤2：配置Python环境
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      # 步骤3：升级pip并安装依赖
      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 步骤4：自动运行单元测试
      - name: 执行单元测试
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v